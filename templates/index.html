<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_api_key }}"></script>
</head>
<body>
<div class="container mt-4">
    <h1>Google Maps Search</h1>
    <form id="searchForm" class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Ciudades (separadas por coma)</label>
            <input type="text" name="cities" class="form-control" placeholder="orlando, tampa, miami">
        </div>
        <div class="col-md-4">
            <label class="form-label">Keywords (separadas por coma)</label>
            <input type="text" name="keywords" class="form-control" placeholder="rebar, steel, hardware">
        </div>
        <div class="col-md-2">
            <label class="form-label">Estado (opcional)</label>
            <input type="text" name="state" class="form-control" placeholder="FL">
        </div>
        <div class="col-md-2 align-self-end">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>
    <div id="map" class="mt-4" style="height: 400px;"></div>
    <div class="mt-4">
        <button id="exportBtn" class="btn btn-secondary">Exportar resultados</button>
        <button id="realCategoryBtn" class="btn btn-info ms-2">Obtener categorías reales</button>
        <table class="table mt-2" id="resultsTable">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Categoría</th>
                    <th>Categoría Real</th>
                    <th>Ciudad</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
